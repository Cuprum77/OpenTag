<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OpenTag Server Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <nav class="inline-tabs">
        <div class="tab-inner"><button class="tab-btn active" data-tab="overview">Overview</button></div>
        <div class="tab-inner"><button class="tab-btn" data-tab="keys">Keys</button></div>
      </nav>
      <h1>OpenTag Server</h1>
    </div>
    <div class="topbar-right">
      <div class="topbar-divider"></div>
      <div class="user">Signed in as <strong id="username">{{ username }}</strong></div>
      <button type="button" id="theme-toggle" class="theme-toggle-btn" title="Toggle dark mode">🌙</button>
      <form method="post" action="/auth/logout" class="signout-form">
        <button type="submit" class="signout-btn">Sign Out</button>
      </form>
    </div>
  </header>

  <main class="layout">
    <!-- OVERVIEW TAB -->
    <section class="tab-content active" id="tab-overview">
      <div class="overview-grid">
        <div class="map-area">
          <div id="map"></div>
        </div>

        <div class="sidebar">
          <div class="card">
            <h2>Tags</h2>
            <div id="tags-container" class="tags-container">
              <p class="hint">Tags will appear here after the first refresh.</p>
            </div>
          </div>

          <div class="card">
            <h2>History & Location Management</h2>

            <label class="history-slider-label">
              Time Range: <span id="history-days-value">7</span> days
            </label>
            <input type="range" id="history-days-slider" min="1" max="30" step="1" value="7">

            <button type="button" id="reload-history">Reload History</button>

            <label class="debug-toggle">
              <input type="checkbox" id="connect-dots-toggle">
              <span>Connect dots by timestamp</span>
            </label>

            <label class="debug-toggle">
              <input type="checkbox" id="highlight-latest-toggle" checked>
              <span>Highlight latest locations</span>
            </label>
          </div>

          <div class="card">
            <h2>Actions</h2>
            <p id="google-targets-feedback" class="hint"></p>
            <form id="google-fetch-form" onsubmit="return false;">
              <label for="apple-accessory-select">Apple accessories</label>
              <select id="apple-accessory-select" multiple size="4">
                <option value="">Select an Apple accessory</option>
              </select>

              <label for="google-compound-name">Google compound trackers</label>
              <select id="google-compound-name" multiple size="5">
                <option value="">Select a compound tracker</option>
              </select>

              <label for="google-canonic-id">Google non-compound trackers</label>
              <select id="google-canonic-id" multiple size="6">
                <option value="">Select a tracker</option>
              </select>

              <label class="debug-toggle" style="margin: 6px 0 10px;">
                <input type="checkbox" id="google-expand-compounds">
                <span>Include compound pieces in the non-compound list</span>
              </label>

              <button type="button" id="fetch-selected-btn">Fetch All Selected</button>
              <button type="button" id="refresh-keys-selected-btn">Refresh Google Keys For Selected</button>
            </form>
          </div>

          <div class="card">
            <h2>Status</h2>
            <div id="status-container" class="status-container">
              <p class="hint">Status will appear here after the first refresh.</p>
            </div>
          </div>

          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <h2 style="margin: 0;">Alerts</h2>
              <button type="button" id="clear-alerts-btn" title="Clear all alerts" style="font-size: 12px; padding: 4px 10px;">Clear</button>
            </div>
            <div id="errors-container" class="errors-container">
              <p class="hint">No errors</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- KEYS TAB -->
    <section class="tab-content" id="tab-keys">
      <div class="keys-layout">
        <div class="card keys-section">
          <h2>Apple Accessories</h2>
          <div class="keys-actions">
            <form id="upload-accessories-form" class="keys-upload-form">
              <label>Upload accessories.json</label>
              <input type="file" id="accessories-file" accept="application/json,.json" required>
              <button type="submit">Upload</button>
            </form>
          </div>
          <p id="apple-feedback" class="hint"></p>
          <div id="apple-accessories-list" class="key-list scrollable"></div>
          <div class="keys-section-divider">
            <span>Source files</span>
          </div>
          <div id="apple-files-list" class="file-list"></div>
        </div>

        <div class="card keys-section">
          <h2>Google Secrets</h2>
          <div class="keys-actions">
            <form id="upload-secrets-form" class="keys-upload-form">
              <label>Upload secrets.json</label>
              <input type="file" id="secrets-file" accept="application/json,.json" required>
              <button type="submit" id="upload-secrets-btn">Upload</button>
            </form>
            <button type="button" id="refresh-google-keys-btn" class="keys-secondary-btn">Refresh Keys from Google</button>
          </div>
          <p id="google-upload-hint" class="hint"></p>
          <p id="google-feedback" class="hint"></p>
          <div id="google-targets-list" class="key-list scrollable"></div>
          <div class="keys-section-divider">
            <span>Auth file</span>
          </div>
          <div id="google-files-list" class="file-list"></div>
        </div>
      </div>
    </section>

      </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
