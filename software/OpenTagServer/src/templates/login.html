<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OpenTag Login</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #f5f7f1 0%, #e6efe5 100%);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .card {
      width: min(92vw, 420px);
      background: #ffffff;
      border: 1px solid #d5ddcd;
      border-radius: 12px;
      padding: 20px;
    }
    .error {
      margin: 0 0 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e0afa9;
      background: #faece9;
      color: #7a261a;
      font-size: 14px;
    }
    h1 { margin: 0 0 16px; font-size: 22px; }
    label { display: block; font-size: 14px; margin: 10px 0 6px; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #c8d0bf;
    }
    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      background: #176c64;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/auth/login">
    <h1>OpenTag Server</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" value="{{ username or '' }}" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Sign In</button>
  </form>
</body>
</html>
