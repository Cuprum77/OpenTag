<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OpenTag Login</title>
  <style>
    :root {
      --ink: #132022;
      --bg: linear-gradient(160deg, #f5f7f1 0%, #e6efe5 100%);
      --card-bg: #ffffff;
      --card-border: #d5ddcd;
      --error-bg: #faece9;
      --error-border: #e0afa9;
      --error-text: #7a261a;
      --input-border: #c8d0bf;
      --btn-bg: #176c64;
      --btn-hover: #0f584f;
    }

    body.dark {
      --ink: #dce4de;
      --bg: linear-gradient(160deg, #0d100d 0%, #1a1f1a 100%);
      --card-bg: #1e241e;
      --card-border: #3a4a3e;
      --error-bg: #2a1a1a;
      --error-border: #5a3030;
      --error-text: #f0a090;
      --input-border: #3a4a3e;
      --btn-bg: #2ab8ba;
      --btn-hover: #3dd9db;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      transition: background 0.25s, color 0.25s;
      position: relative;
    }

    /* ── Theme toggle button (top-right corner) ── */
    .login-theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--ink);
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      padding: 6px 10px;
      transition: background 0.2s, border-color 0.2s;
      line-height: 1;
    }

    .login-theme-toggle:hover {
      background: rgba(15, 107, 109, 0.08);
      border-color: var(--btn-bg);
    }

    body.dark .login-theme-toggle:hover {
      background: rgba(61, 217, 219, 0.1);
    }

    .card {
      width: min(92vw, 420px);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      transition: background 0.25s, border-color 0.25s;
    }
    .error {
      margin: 0 0 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 14px;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    h1 { margin: 0 0 16px; font-size: 22px; }
    label { display: block; font-size: 14px; margin: 10px 0 6px; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--ink);
      transition: background 0.25s, color 0.25s, border-color 0.25s;
    }
    input::placeholder {
      color: var(--ink);
      opacity: 0.5;
    }
    button[type="submit"] {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      background: var(--btn-bg);
      color: #fff;
      font-weight: 600;
      transition: background 0.2s;
    }
    button[type="submit"]:hover {
      background: var(--btn-hover);
    }
  </style>
</head>
<body>
  <button type="button" id="login-theme-toggle" class="login-theme-toggle" title="Toggle dark mode">🌙</button>
  <form class="card" method="post" action="/auth/login">
    <h1>OpenTag Server</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" value="{{ username or '' }}" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Sign In</button>
  </form>
</body>
</html>
